<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>Password Ledger</title>
</head>
<body>
  <div id="container">
    
    <!-- Lock Screen -->
    <div id="lock-screen" class="view active">
      <h2>Password Ledger</h2>
      <p>Enter Master Password</p>
      <input type="password" id="master-password" placeholder="Password" autofocus>
      <button id="unlock-btn">Unlock</button>
      <div id="lock-error" class="error-msg"></div>
    </div>

    <!-- Vault Screen -->
    <div id="vault-screen" class="view">
      <div class="header">
        <h2>Vault</h2>
        <button id="lock-btn">Lock</button>
      </div>
      <input type="text" id="search-input" placeholder="Search entries...">
      <div id="results-container">
        <!-- Results will be injected here -->
      </div>
      <div id="vault-msg" class="msg"></div>
    </div>

  </div>
  <script src="../browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
